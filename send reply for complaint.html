<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
    <title>Reply to Complaint</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .form-container {
            background: #A4A175;
            padding: 30px 30px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            width: 350px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 10px;
            font-size: 15px;
        }

        textarea {
            width: 100%;
            height: 100px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            resize: none;
        }

        input[type="submit"] {
            background-color: #2B5B3F;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 16px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #143829;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #5F6F52;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }

        .back-button:hover {
            background-color: #3e4c38;
        }

        .form-title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <a class="back-button" onclick="history.back()"> Go Back</a>

    <div class="form-container">
        <div class="form-title">Reply to Complaint</div>
        <form action="/complaintreply_post" method="post">
            <table>
                <tr>
                    <td><strong>Reply:</strong></td>
                    <td><textarea name="textarea" required></textarea></td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <input type="submit" name="Submit" value="Send" />
                    </td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>
