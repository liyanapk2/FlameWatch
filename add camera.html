
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Add Camera</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f1f3f5;
    padding: 20px;
  }

  table {
    width: 50%;
    margin: 20px auto;
    border-collapse: collapse;
    background-color: #ffffff;
    box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
  }

  td {
    padding: 12px;
    text-align: left;
    border: 1px solid #ddd;
  }

  td label {
    font-weight: bold;
    color: #333;
  }

  input[type="text"], textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }

  input[type="submit"] {
    background-color: #4CAF50;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  input[type="submit"]:hover {
    background-color: #45a049;
  }

  .center {
    text-align: center;
  }

  h1 {
    text-align: center;
    color: #333;
  }
</style>
</head>

<body>
  <h1>Add New Camera</h1>
  <form id="form1" name="form1" method="post" action="addcamera_post">
    <table>
      <tr>
        <td><label for="camera_no">Camera No:</label></td>
        <td><input type="text" name="textfield" id="camera_no" required pattern="[0-9]{2,6}" title="Enter valid number" /></td>
      </tr>
      <tr>
        <td><label for="location">Location:</label></td>
        <td><textarea name="textarea" id="location" required pattern="[A-Z a-z.]{3,25}" title="Enter valid place"></textarea></td>
      </tr>

      <tr>
        <td colspan="2" class="center">
          <input type="submit" name="Submit" value="Add" />
        </td>
      </tr>
    </table>
  </form>
</body>
</html>
