<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Add Preserved Item</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #eef3f7;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 700px;
    margin: 40px auto;
    padding: 30px;
    background-color: #ffffff;
    border-radius: 12px;
    box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.1);
    position: relative;
  }

  .back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    background-color: #5c7c60;
    color: white;
    padding: 8px 14px;
    border-radius: 5px;
    text-decoration: none;
    font-size: 14px;
  }

  .back-btn:hover {
    background-color: #4a634e;
  }

  h1 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 30px;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 15px;
  }

  td {
    padding: 10px;
    vertical-align: top;
  }

  label {
    font-weight: bold;
    color: #333;
  }

  input[type="text"],
  input[type="file"],
  textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  input[type="submit"] {
    background-color: #2e8b57;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
  }

  input[type="submit"]:hover {
    background-color: #276748;
  }

  .center {
    text-align: center;
    padding-top: 10px;
  }
</style>
</head>

<body>
  <div class="container">
    <a href="javascript:history.back()" class="back-btn"> Back</a>
    <h1>Add Preserved Item</h1>
    <form action="addpreserved_post" method="post" enctype="multipart/form-data">
      <table>
        <tr>
          <td><label for="name">Name</label></td>
          <td><input type="text" name="textfield" id="name" required pattern="[A-Z a-z.]{2,25}" title="Enter valid name" /></td>
        </tr>
        <tr>
          <td><label for="file">Image</label></td>
          <td><input type="file" name="file" id="file" required /></td>
        </tr>
        <tr>
          <td><label for="description">Description</label></td>
          <td><textarea name="textarea" id="description" required></textarea></td>
        </tr>
        <tr>
          <td colspan="2" class="center">
            <input type="submit" name="Submit" value="Add" />
          </td>
        </tr>
      </table>
    </form>
  </div>
</body>
</html>
