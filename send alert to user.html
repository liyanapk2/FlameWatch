<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Send Alert</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #eef2f3;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
  }
  .form-container {
    background: #fff;
    padding: 20px;
    box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    border-radius: 10px;
    text-align: center;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  td {
    padding: 10px;
    text-align: left;
  }
  textarea {
    width: 100%;
    height: 50px;
    padding: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }
  input[type="submit"] {
    background: #007bff;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
  }
  input[type="submit"]:hover {
    background: #0056b3;
  }
</style>
</head>
<body>
<div class="form-container">
<form action="/sendalerttouser_post" method="post">
  <table>
    <tr>
      <td>Alert</td>
      <td><textarea name="textarea1" required></textarea></td>
    </tr>
    <tr>
      <td>Longitude</td>
      <td><textarea name="textarea2"></textarea></td>
    </tr>
    <tr>
      <td>Latitude</td>
      <td><textarea name="textarea3"></textarea></td>
    </tr>
    <tr>
      <td colspan="2" style="text-align: center;">
        <input type="submit" name="Submit" value="Send" />
      </td>
    </tr>
  </table>
</form>
</div>
</body>
</html>
